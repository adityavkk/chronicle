name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v8

  # The containerized-Redis PBT job: `go test ./...` against a live Redis 8.
  # Besides the MemoryStore-vs-Redis equivalence harness (#26) and the producer
  # differential (#32), this runs the control-plane fence/ordering/slot
  # triple-mirror differential (#33): TestFenceDecisionTripleMirror /
  # TestOffsetGreaterTripleMirror / TestSlotHomingMirror in ./webhook (Go core vs
  # live Lua via probe_predicates.lua, on DB 14), TestStreamSeqLexMirror in
  # ./store/redis (the LB-2 Stream-Seq `<=` digit-width property, INV-DIFF-03, on
  # DB 15), and the checker-side mirrors in ./jepsen/checker (Go core vs the
  # checker's independent reference, pure). It also runs the config/normalization
  # parse-seam properties (#34): the pure ContentTypeMatches / ConfigMatches /
  # ParseTTL / ParseSubOffset / IsValidIntegerString grammar + overflow-seam
  # properties in ./store and ./protocol, plus their live-Lua legs in ./store/redis
  # (norm_ct three-way agreement and config_matches MATCHED/MISMATCH cross-check,
  # on DB 15). All skip cleanly when Redis is unreachable; here it is the `redis`
  # service below, so they exercise the live Lua and a divergence shrinks to a
  # replayable rapid seed.
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go test -race -count=1 ./...

  # The Redis-direct jepsen linearizability scenarios drive webhook.RedisStore's
  # real Lua against the containerized Redis (no k3d cluster, no chronicle HTTP
  # server), so they run in CI. ownership-exclusivity (T3) is the live binding of
  # model_shard.go's shardModel() to the shipped claim_shard.lua / check_owner.lua
  # over the ds:{ownership}:slot:<h> hash — without it, INV-OWNER-01/02 would rest
  # only on the model agreeing with its own unit tests. shard-linz (T1) is the
  # sibling Redis-direct gate over leaseModel(). store-linz (#35) is the DATA-PLANE
  # gate: K clients race append/read/close/getOffset on ONE stream and the history
  # is checked against streamModel() (model_store.go), binding INV-LIN-01/02,
  # INV-CLOSE-01, INV-READ-01 (single-slot EVAL = linearization point, no torn /
  # gapped / duplicated frame, idempotent close, exact offset-exclusive suffix incl.
  # clean read-past-close EOF) to the shipped store/redis Lua — prose-only before.
  # composed (#36) is the TWO-FENCE COMPOSITION gate: K workers contend on ONE
  # (sub, slot), racing the subscription's inner (gen, wake) lease fence AND that
  # slot's outer (owner, epoch) ownership lease at once (claim_shard transfer/renew
  # interleaved with claim/ack/release under the caller's OwnerScope so ack.lua
  # inlines owner_fenced above the (gen,wake) fence), and the history is checked
  # against composedModel() (model_composed.go). It binds INV-FENCE-01 (single-holder)
  # ACROSS owner-epoch transitions and INV-OWNER-02 (owner-epoch is optimization-only,
  # never a correctness dependency): every server OK must be fence-valid under the
  # inner register ALONE. The fork-sub-offset differential (#36 data plane) runs in
  # the `test` job's `go test ./...` (store/redis against the containerized Redis).
  # Bounds (-slots/-workers/-workload-ms) keep each per-key Porcupine search inside
  # its budget; Unknown counts as FAIL, so a future drift between the oracle and the
  # shipped Lua is caught here. On a counterexample the VisualizePath witness is
  # uploaded as an artifact.
  #
  # The other linz scenarios (single-holder-linz, stale-gen-noop) drive the full
  # claim/ack HTTP API and so need a running chronicle server, not just Redis; they
  # belong with the cluster-backed jepsen rig (jepsen/run.sh), not this Redis-only
  # job.
  linz:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build the jepsen checker
        run: go build -o jepsen/bin/jepsen-checker ./jepsen/checker
      - name: T3 ownership exclusivity (claim_shard / check_owner against live Redis)
        run: |
          jepsen/bin/jepsen-checker -scenario ownership-exclusivity \
            -redis-url redis://localhost:6379/14 \
            -slots 4 -workers 4 -workload-ms 4000
      - name: T1 per-(subId,g) shard lease linearizability
        run: |
          jepsen/bin/jepsen-checker -scenario shard-linz \
            -redis-url redis://localhost:6379/14 \
            -workers 4 -workload-ms 4000
      - name: INV-LIN-01 data-plane linearizability (append/read/close on one stream)
        run: |
          jepsen/bin/jepsen-checker -scenario store-linz \
            -redis-url redis://localhost:6379/14 \
            -workers 4 -workload-ms 4000
      - name: INV-OWNER-02 composed two-fence ((gen,wake) x (owner,epoch)) interaction
        run: |
          jepsen/bin/jepsen-checker -scenario composed \
            -redis-url redis://localhost:6379/14 \
            -workers 4 -workload-ms 4000
      - name: Upload store-linz Porcupine counterexample (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: store-linz-counterexample
          path: store-linz-counterexample.html
          if-no-files-found: ignore
      - name: Upload composed Porcupine counterexample (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: composed-counterexample
          path: composed-counterexample.html
          if-no-files-found: ignore

  # P1.2 (issue #31): the THIRD differential oracle — the proven Lean
  # producer/offset model compiled to C and linked via cgo, pinned against the
  # Go core and the live Lua mirror. Two jobs:
  #
  #   property-based-testing — links the VENDORED archive (no Lean toolchain) and
  #     runs the triple-oracle differential with -tags leanoracle.
  #   formal-verification    — rebuilds the C from Lean and asserts the freshly
  #     built archive is byte-identical to the committed one (drift guard), so a
  #     stale vendored oracle cannot pass silently.
  #
  # Both run on macos-14 (Apple Silicon) because the committed
  # store/leanoracle/libchronicle_oracle.a is a Mach-O arm64 archive: linking and
  # the byte-identity drift guard are arch-specific (see store/leanoracle/PROVENANCE.txt).
  # A Linux/x86_64 consumer must rebuild the archive for its arch via the build
  # script before linking; cross-arch vendoring is a documented follow-up.
  property-based-testing:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Start Redis 8
        run: |
          brew install redis
          redis-server --daemonize yes --port 6379
          for i in $(seq 1 30); do redis-cli ping && break; sleep 0.2; done
      - name: Triple-oracle differential (Go core vs live Lua vs proven Lean) — vendored C, NO Lean toolchain
        env:
          CGO_ENABLED: "1"
          MACOSX_DEPLOYMENT_TARGET: "15.0"
        run: |
          # Links the committed store/leanoracle/libchronicle_oracle.a; no elan/Lean installed.
          go test -tags leanoracle -count=1 ./store/leanoracle/ ./store/redis/

  formal-verification:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Install the pinned Lean toolchain (elan reads lean-toolchain)
        run: |
          curl https://elan.lean-lang.org/elan-init.sh -sSf | sh -s -- -y --no-modify-path
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Functional drift guard — rebuild the oracle from the Lean source and assert it agrees with the Go core
        run: |
          # Rebuild libchronicle_oracle.a from the current Lean source (overwrites the vendored copy in this throwaway runner).
          store/leanoracle/scripts/build-lean-oracle.sh
          # The freshly-built oracle must agree with the Go core. This is machine-independent: it catches any drift of the
          # Lean source from the Go semantics. Byte-identity across toolchains is not guaranteed (clang/SDK/Lean patch differ),
          # so it is reported below for information only, not asserted.
          CC=/usr/bin/clang MACOSX_DEPLOYMENT_TARGET=15.0 go test -tags leanoracle -count=1 ./store/leanoracle/
          git diff --stat -- store/leanoracle/libchronicle_oracle.a || true

  conformance:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build and start chronicle
        run: |
          go build -o bin/chronicle ./cmd/chronicle
          CHRONICLE_LISTEN=":4437" \
          CHRONICLE_REDIS_URL="redis://localhost:6379/15" \
          CHRONICLE_LONG_POLL_TIMEOUT="500ms" \
            ./bin/chronicle &
          for i in $(seq 1 50); do
            curl -sf -X PUT http://localhost:4437/v1/stream/__health__ && break
            sleep 0.2
          done
          curl -sf -X DELETE http://localhost:4437/v1/stream/__health__ || true
      - name: Run conformance suite
        run: |
          npm --prefix test/conformance install --no-audit --no-fund
          cd test/conformance && CONFORMANCE_TEST_URL=http://localhost:4437 \
            npx vitest run --no-coverage --reporter=default

  # Lean pure-core proofs (issue #30 / P1.1). Separate from the Go jobs and gated
  # on `lean/` changes so routine Go CI never invokes Lean. The toolchain is pinned
  # by lean/lean-toolchain (leanprover/lean4:v4.31.0); mathlib oleans are fetched
  # from the upstream cache (`lake exe cache get`) — mathlib is NOT built from source.
  lean-proofs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lean
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://elan.lean-lang.org/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Cache mathlib build (oleans)
        uses: actions/cache@v4
        with:
          path: lean/.lake/packages/mathlib/.lake/build
          key: mathlib-${{ hashFiles('lean/lake-manifest.json') }}
      - name: Fetch prebuilt mathlib oleans
        run: lake exe cache get
      - name: Build all proofs (lake build must succeed)
        run: lake build
      - name: Axiom gate — no theorem may depend on `sorry` or `native_decide`
        run: |
          lake env lean Chronicle/Axioms.lean > axioms.txt 2>&1
          cat axioms.txt
          if grep -qE 'sorryAx|ofReduceBool' axioms.txt; then
            echo "::error::a theorem depends on sorry (sorryAx) or native_decide (ofReduceBool)"
            exit 1
          fi
      - name: No `sorry` tactic / `native_decide` in proof sources
        run: |
          # Match `sorry` only as a tactic/term (`:= sorry`, `by sorry`, a `sorry`
          # on its own), not the word "sorry" in doc-comment prose. The axiom gate
          # above is the authoritative check; this is a fast belt-and-suspenders.
          if grep -rnE '(:=|\bby\b|·|<;>)\s*(sorry|native_decide)\b' Chronicle/ ; then
            echo "::error::found a sorry tactic or native_decide in Chronicle/ sources"
            exit 1
          fi

  # TLA+ model-check of the subscription-fence concurrent protocol (issue #37).
  # Its own job, NOT a step in the Go `test` job, so it never blocks ordinary
  # Go CI. Pins tla2tools.jar to a release and fails on any invariant violation
  # or an undeclared deadlock (the spec runs TLC with -deadlock off because
  # quiescence is benign; see formal/tla/README.md).
  tlc:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: formal/tla
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache tla2tools.jar
        uses: actions/cache@v4
        with:
          path: formal/tla/tla2tools.jar
          key: tla2tools-v1.7.4
      - name: Model-check both faithful configs (fails on any violation)
        run: make tlc
      - name: Negative test — expire fault MUST violate SingleHolder (INV-FENCE-04)
        run: make fault-expire
      - name: Negative test — claim ZREM fault MUST violate NoStrandedLease (INV-LEASE-02)
        run: make fault-lease
      - name: Crash-window coverage — each window MUST be reachable on 2x2
        run: |
          fail=0
          for W in 1 2 3 4; do
            if make tlc 2>/dev/null; then :; fi
            out=$(java -XX:+UseParallelGC -cp tla2tools.jar tlc2.TLC -deadlock -workers auto \
                    -config SubscriptionFence_coverage_W${W}.cfg MC_2x2.tla 2>&1 || true)
            if echo "$out" | grep -q "Invariant NotW${W} is violated"; then
              echo "W${W}: reached"
            else
              echo "::error::crash window W${W} was NOT reached on the 2x2 config"
              fail=1
            fi
          done
          exit $fail
      - name: Token-refresh liveness (#77) — leads-to + witness + negative control
        run: make token-refresh

  # TLA+ model-check of the Ownership module + the fence-on/fence-off layering
  # proof + the liveness/fairness encoding (issue #38). Its own job, parallel to
  # the #37 `tlc` job. Runs the standalone owner-epoch CAS, the twin layering
  # runs (owner_fenced Real and AlwaysPass, at 1 slot and the symmetry-quotiented
  # 2/2/2 scale), the Deposed-owner-late-write non-vacuity witness, the leads-to
  # liveness properties under weak fairness, the no-fairness negative test, and
  # the LB-5 threshold-sensitivity safety check. Fails on any safety-invariant
  # violation, temporal-property violation, or a missing-fairness deadlock.
  tlc38:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: formal/tla
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache tla2tools.jar
        uses: actions/cache@v4
        with:
          path: formal/tla/tla2tools.jar
          key: tla2tools-v1.7.4
      - name: Ownership + 1-slot layering proof + liveness (fast subset; the heavy 2x2 runs in formal-nightly)
        run: make tlc38-fast
