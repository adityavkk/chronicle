<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Durable Streams — dsui</title>
    <script>
      // Apply the persisted theme before first paint to avoid a flash. The
      // store reads/writes the same localStorage key ("dsui.theme").
      try {
        var t = localStorage.getItem("dsui.theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
