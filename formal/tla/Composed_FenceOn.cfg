\* TLC config: COMPOSED spec with the owner-epoch fence ENFORCED (FENCE_MODE
\* = Real).  Asserts []SingleHolder of the inner (gen,wake) fence holds with
\* the outer owner-epoch fence active.  Pair with Composed_FenceOff.cfg: the
\* two differ ONLY in FENCE_MODE (the fence-on-vs-fence-off layering proof,
\* INV-OWNER-02).
\* Run: java -cp /tmp/tla2tools.jar tlc2.TLC -config Composed_FenceOn.cfg MC_Composed.tla
SPECIFICATION Spec

CONSTANTS
    Workers    = {w1, w2}
    Subs       = {s1}
    Slots      = {h1}
    MaxGen     = 2
    MaxEpoch   = 2
    MaxClock   = 2
    MaxCrashes = 1
    FENCE_MODE = "Real"

INVARIANT Inv

PROPERTY
    GenMonotoneProp
    EpochMonotoneProp

CONSTRAINT StateConstraint
