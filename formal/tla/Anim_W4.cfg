\* Curated trace REACHING crash window W4; renders one SVG per state via the
\* AnimAlias. 2 workers x 1 sub, named (no symmetry) for legible frames.
SPECIFICATION Spec
CONSTANTS
    Workers = {w1, w2}
    Subs    = {s1}
    MaxGen            = 3
    MaxClock          = 3
    MaxCrashes        = 1
    ExpireClearsFence = TRUE
    ClaimReScores     = TRUE
INVARIANT NotW4
ALIAS AnimAlias
CONSTRAINT StateConstraint
