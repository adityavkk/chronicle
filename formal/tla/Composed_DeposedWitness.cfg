\* Coverage witness: the Deposed-owner-late-write scenario IS reachable under
\* AlwaysPass, so the layering proof genuinely exercises the write the owner
\* fence would have stopped (NOT a vacuous pass).  NotDeposedLateWrite MUST be
\* VIOLATED (TLC returns a witnessing trace).
SPECIFICATION Spec
CONSTANTS
    Workers    = {w1, w2}
    Subs       = {s1}
    Slots      = {h1}
    MaxGen     = 2
    MaxEpoch   = 2
    MaxClock   = 2
    MaxCrashes = 1
    FENCE_MODE = "AlwaysPass"
INVARIANT NotDeposedLateWrite
CONSTRAINT StateConstraint
