\* TLC config: COMPOSED spec with the owner-epoch fence DELETED (FENCE_MODE =
\* AlwaysPass -- owner_fenced forced FALSE).  This is the LOAD-BEARING run of
\* the layering proof (INV-OWNER-02): with the outer fence gone, the only
\* thing preventing two simultaneously ack-acceptable holders is the inner
\* (gen,wake) fence.  []SingleHolder MUST still hold, discharging the claim
\* "owner-epoch is an optimization, never a correctness dependency".  Differs
\* from Composed_FenceOn.cfg ONLY in FENCE_MODE.
\* Run: java -cp /tmp/tla2tools.jar tlc2.TLC -config Composed_FenceOff.cfg MC_Composed.tla
SPECIFICATION Spec

CONSTANTS
    Workers    = {w1, w2}
    Subs       = {s1}
    Slots      = {h1}
    MaxGen     = 2
    MaxEpoch   = 2
    MaxClock   = 2
    MaxCrashes = 1
    FENCE_MODE = "AlwaysPass"

INVARIANT Inv

PROPERTY
    GenMonotoneProp
    EpochMonotoneProp

CONSTRAINT StateConstraint
