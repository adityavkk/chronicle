\* INV-FENCE-04 negative-control ANIMATION: ExpireClearsFence=FALSE injects the
\* unsound expire (drop lease, KEEP the claimable fence). A second worker then
\* coalesces onto the SAME (gen,wake) -> TWO ack-acceptable holders. SingleHolder
\* is violated and the AnimAlias renders the trace: the LAST frame shows two
\* GREEN token circles in one row -- the visual definition of a fence breach.
\* 2 workers x 1 sub, named (no symmetry).
SPECIFICATION Spec
CONSTANTS
    Workers = {w1, w2}
    Subs    = {s1}
    MaxGen            = 3
    MaxClock          = 3
    MaxCrashes        = 0
    ExpireClearsFence = FALSE
    ClaimReScores     = TRUE
INVARIANT SingleHolder
ALIAS AnimAlias
CONSTRAINT StateConstraint
