\* Convergence lane for the Membership spec (issue #40, INV-JEP-L4-01): under
\* weak fairness of the survivors' heartbeats and the slot-reconcile claims,
\* after churn stops the system eventually reaches and STAYS converged (one
\* unexpired HRW-target owner per slot, no oscillation).
\*
\* NO StateConstraint here: the churn budget (MaxChurn) already bounds the
\* state space AND the epoch, and MaxEpoch is sized with headroom
\* (MaxEpoch > MaxChurn + |Slots| = 4 + 2) so the epoch ceiling can never be
\* reached -- thus no state constraint can cut off a behavior during liveness
\* checking (the hazard TLC warns about in Specifying Systems 14.3.5).
SPECIFICATION Spec

CONSTANTS
    Replicas <- MCReplicas
    Slots <- MCSlots
    Score <- MCScore
    MemberTTL = 2
    SlotTTL = 2
    MaxEpoch = 8
    MaxChurn = 4

INVARIANT TypeOK
PROPERTY EventuallyConverges
PROPERTY EventualConvergence
