\* TLC config: the NoDoubleLiveHolder safety check under the SlowConsumer +
\* re-emit scenario (#38, INV-JEP-L1-01).  SafetySpec includes LeaseLapse (the
\* crash-after-claim / slow-consumer fault, crash window 4).  Two workers race
\* on a re-emitted wake: the (gen,wake) fence + the BUSY guard + the empty
\* wake_id left by expire_lease must ensure no two simultaneously ack-acceptable
\* holders.  A re-emit to a slow-but-still-live consumer degrades to
\* at-least-once, NEVER a safety violation.  ReemitTicks = 3 (the real floor).
\* Run: java -cp /tmp/tla2tools.jar tlc2.TLC -config Liveness_Safety.cfg MC_Liveness.tla
SPECIFICATION SafetySpec

CONSTANTS
    Workers     = {w1, w2}
    MaxGen      = 3
    ReemitTicks = 3
    MaxStale    = 5

INVARIANT
    TypeOK
    NoDoubleLiveHolder

CONSTRAINT StateConstraint
