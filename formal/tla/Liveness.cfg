\* TLC config: the LIVENESS leads-to properties under weak fairness of the
\* sweep/due loops (#38, INV-WAKE-01, INV-RECOVER-01, INV-RECOVER-02).
\* ReemitTicks = 3 models the 3*sweepInterval T4 floor.
\* Run: java -cp /tmp/tla2tools.jar tlc2.TLC -config Liveness.cfg MC_Liveness.tla
SPECIFICATION Spec

CONSTANTS
    Workers     = {w1}
    MaxGen      = 3
    ReemitTicks = 3
    MaxStale    = 5

INVARIANT TypeOK

PROPERTY
    PendingWorkLeadsToWake
    StrandedT1LeadsToReemit
    StrandedT4LeadsToReemit
    PendingWorkEventuallyDelivered

\* No CONSTRAINT: the state space is already bounded by the action guards
\* (DueFire/Claim require gen < MaxGen; SweepTick requires staleTicks < MaxStale),
\* so a state CONSTRAINT would be redundant.  Crucially, a CONSTRAINT during
\* LIVENESS checking can truncate behaviors and mask a real leads-to violation
\* (Specifying Systems sec 14.3.5); omitting it makes TLC check the temporal
\* properties on the genuinely-complete state graph, so the verdicts are sound.
