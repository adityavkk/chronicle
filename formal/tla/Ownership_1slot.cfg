\* TLC config: standalone Ownership owner-epoch CAS, 2 replicas x 1 slot.
\* INV-OWNER-01: SingleOwner holds, owner_epoch monotone, TRANSFER bumps it
\* strictly, RENEW keeps it, a live foreign owner is BUSY.
\* Run: java -cp /tmp/tla2tools.jar tlc2.TLC -config Ownership_1slot.cfg MC_Ownership.tla
SPECIFICATION OSpec

CONSTANTS
    Replicas = {r1, r2}
    Slots    = {h1}
    MaxEpoch = 3
    MaxClock = 2

SYMMETRY OSym

INVARIANT OInv

PROPERTY
    EpochMonotoneProp
    TransferBumpsEpochProp
    RenewKeepsEpochProp

CONSTRAINT OStateConstraint
