\* TLC config: COMPOSED spec, FENCE OFF (AlwaysPass), SCALED 2 subs x 2 workers
\* x 2 slots.  The load-bearing scaled layering run: with the owner-epoch fence
\* deleted, []SingleHolder of the inner (gen,wake) fence MUST still hold at the
\* 2/2/2 scope (INV-OWNER-02).  Differs from Composed_FenceOn_2x2.cfg ONLY in
\* FENCE_MODE.
\* Runs against MC_ComposedSym (Permutations(Workers/Subs/Slots)) so the
\* un-quotiented 2/2/2 state space stays tractable; see MC_ComposedSym.tla for
\* the soundness argument.
\* Run: java -cp /tmp/tla2tools.jar tlc2.TLC -config Composed_FenceOff_2x2.cfg MC_ComposedSym.tla
SPECIFICATION Spec

CONSTANTS
    Workers    = {w1, w2}
    Subs       = {s1, s2}
    Slots      = {h1, h2}
    MaxGen     = 2
    MaxEpoch   = 2
    MaxClock   = 1
    MaxCrashes = 1
    FENCE_MODE = "AlwaysPass"

SYMMETRY Sym

INVARIANT Inv

PROPERTY
    GenMonotoneProp
    EpochMonotoneProp

CONSTRAINT StateConstraint
