\* FAULT-INJECTION config (INV-FENCE-04 / INV-LEASE-01 negative test).
\* ExpireClearsFence = FALSE injects the unsound expire: it drops only the
\* lease and leaves the sub in a claimable waking state with the (gen, wake)
\* fence INTACT and the holder's token still valid.  A second worker then
\* coalesces onto the SAME (gen, wake), so two workers hold the identical
\* current fence -- two ack-acceptable tokens.  This MUST produce a
\* SingleHolder counterexample, proving the invariant constrains the spec.
\* Faithful runs use ExpireClearsFence = TRUE.
\* Run: java -cp /tmp/tla2tools.jar tlc2.TLC -config SubscriptionFence_fault_expire.cfg MC_2x2.tla
SPECIFICATION Spec

CONSTANTS
    Workers = {w1, w2}
    Subs    = {s1}
    MaxGen            = 3
    MaxClock          = 3
    MaxCrashes        = 0
    ExpireClearsFence = FALSE
    ClaimReScores     = TRUE

SYMMETRY Sym

INVARIANT Inv

CONSTRAINT StateConstraint
