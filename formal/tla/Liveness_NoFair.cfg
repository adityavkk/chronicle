\* TLC config: the NEGATIVE liveness test.  SpecNoFair drops the weak-fairness
\* assumption on the sweep/due loops.  The leads-to properties MUST FAIL here
\* (TLC reports a temporal-property counterexample: a behavior where the
\* sweep/due loop never fires, so pending work never becomes a wake).  This
\* proves the liveness properties are NON-TRIVIAL -- they genuinely depend on
\* the fairness of the background loops (#38 acceptance criterion).
\* Run: java -cp /tmp/tla2tools.jar tlc2.TLC -config Liveness_NoFair.cfg MC_Liveness.tla
SPECIFICATION SpecNoFair

CONSTANTS
    Workers     = {w1}
    MaxGen      = 3
    ReemitTicks = 3
    MaxStale    = 5

PROPERTY
    PendingWorkLeadsToWake

\* No CONSTRAINT (see Liveness.cfg): the guards already bound the space, and a
\* CONSTRAINT during liveness checking can mask a leads-to violation.  Here the
\* leads-to MUST fail anyway (no fairness), but we keep the complete state graph.
