\* Non-vacuity witness for the Membership convergence spec (issue #40): runs
\* the NEGATION of TransferReachable as an INVARIANT, so TLC reports it VIOLATED
\* -- proving a genuine TRANSFER (epoch >= 2: a slot claimed, then taken over by
\* a survivor after the first owner crashed) really happens, so the convergence
\* run is not vacuous. The Makefile runs this AND the zero-owner-gap witness
\* (Membership_WitnessGap.cfg) and asserts each is violated.
SPECIFICATION SpecNoFair

CONSTANTS
    Replicas <- MCReplicas
    Slots <- MCSlots
    Score <- MCScore
    MemberTTL = 2
    SlotTTL = 2
    MaxEpoch = 8
    MaxChurn = 4

INVARIANT NotTransferReachable

CONSTRAINT StateConstraint
