\* Negative control for the Membership convergence spec (issue #40): WITHOUT
\* weak/strong fairness, the convergence leads-to MUST FAIL -- TLC must find a
\* counterexample where churn stops, a survivor exists, yet the reconcile loop
\* (or the clock, or the heartbeat) never fires, so a slot never settles. This
\* proves EventuallyConverges is NON-TRIVIAL (it genuinely depends on fairness).
SPECIFICATION SpecNoFair

CONSTANTS
    Replicas <- MCReplicas
    Slots <- MCSlots
    Score <- MCScore
    MemberTTL = 2
    SlotTTL = 2
    MaxEpoch = 8
    MaxChurn = 4

PROPERTY EventuallyConverges

CONSTRAINT StateConstraint
