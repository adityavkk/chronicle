\* Negative control: WITHOUT the expired self-heal (BrokenSpec = the pre-#77
\* behaviour) the SAME leads-to MUST FAIL — an expired worker stays locked out.
\* The Makefile asserts TLC reports the temporal-property violation.
SPECIFICATION BrokenSpec
CONSTANTS
    TTL       = 3
    Threshold = 1
    MaxTime   = 8
PROPERTY  ExpiredLeadsToUsable
