\* Render a curated trace that REACHES crash window W1 (pull-wake arm-before-
\* emit). TLC reports a counterexample to NotW1; with the ALIAS set it writes
\* one SubscriptionFence_anim_<n>.svg per state of that trace -- a shareable
\* filmstrip of the window. 2 workers x 1 sub, named (no symmetry).
SPECIFICATION Spec
CONSTANTS
    Workers = {w1, w2}
    Subs    = {s1}
    MaxGen            = 3
    MaxClock          = 3
    MaxCrashes        = 1
    ExpireClearsFence = TRUE
    ClaimReScores     = TRUE
INVARIANT NotW1
ALIAS AnimAlias
CONSTRAINT StateConstraint
