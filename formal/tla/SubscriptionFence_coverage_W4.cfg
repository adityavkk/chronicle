\* Crash-window coverage witness W4 (2x2 instance).  TLC reports a
\* counterexample iff WindowW4 is REACHABLE; the trace is the witness.
SPECIFICATION Spec
CONSTANTS
    Workers = {w1, w2}
    Subs    = {s1, s2}
    MaxGen            = 2
    MaxClock          = 2
    MaxCrashes        = 1
    ExpireClearsFence = TRUE
    ClaimReScores     = TRUE
SYMMETRY Sym
INVARIANT NotW4
CONSTRAINT StateConstraint
