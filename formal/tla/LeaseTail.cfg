\* L3 lease-tail-drop refinement (issue #40, INV-LR-01 / INV-JEP-L3-01): the
\* lease ZSET is a cache repairable from the durable record. Checks the safety
\* invariant (no spurious lease) AND the recoverability liveness (a stranded
\* lease is eventually restored from the durable hash, under WF of reconcile).
SPECIFICATION Spec

CONSTANTS
    Records = {r1, r2}

INVARIANT Inv
PROPERTY LeaseRecoverable
