\* TLC config: COMPOSED spec, FENCE ON (Real), SCALED 2 subs x 2 workers x 2
\* slots.  Each sub is statically homed to one of the two slots (subSlot).
\* Asserts []SingleHolder with the owner-epoch fence enforced at the larger
\* scope.  Pair with Composed_FenceOff_2x2.cfg (differs ONLY in FENCE_MODE).
\* Runs against MC_ComposedSym (Permutations(Workers/Subs/Slots)) so the
\* un-quotiented 2/2/2 state space stays tractable; see MC_ComposedSym.tla for
\* the soundness argument (the holder/owner registers are the symmetric-register
\* pattern, identical to the #37 SubscriptionFence symmetry).
\* Run: java -cp /tmp/tla2tools.jar tlc2.TLC -config Composed_FenceOn_2x2.cfg MC_ComposedSym.tla
SPECIFICATION Spec

CONSTANTS
    Workers    = {w1, w2}
    Subs       = {s1, s2}
    Slots      = {h1, h2}
    MaxGen     = 2
    MaxEpoch   = 2
    MaxClock   = 1
    MaxCrashes = 1
    FENCE_MODE = "Real"

SYMMETRY Sym

INVARIANT Inv

PROPERTY
    GenMonotoneProp
    EpochMonotoneProp

CONSTRAINT StateConstraint
