\* TLC config: the THRESHOLD-SENSITIVITY check for LB-5 (#38).  Identical to
\* Liveness_Safety.cfg EXCEPT ReemitTicks = 0 (the T4 re-emit fires as early as
\* possible -- the most aggressive double-delivery pressure).  NoDoubleLiveHolder
\* MUST STILL HOLD: safety is THRESHOLD-INDEPENDENT.  The (gen,wake) fence is the
\* backstop regardless of the 3*sweepInterval value, so "3x" is a liveness/
\* efficiency tuning knob for WHEN re-emit happens, NOT a safety guarantee.
\* Run: java -cp /tmp/tla2tools.jar tlc2.TLC -config Liveness_Sensitivity.cfg MC_Liveness.tla
SPECIFICATION SafetySpec

CONSTANTS
    Workers     = {w1, w2}
    MaxGen      = 3
    ReemitTicks = 0
    MaxStale    = 5

INVARIANT
    TypeOK
    NoDoubleLiveHolder

CONSTRAINT StateConstraint
