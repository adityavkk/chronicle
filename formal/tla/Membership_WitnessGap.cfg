\* Zero-owner-gap non-vacuity witness (issue #40): runs the NEGATION of
\* ZeroOwnerGapReachable as an INVARIANT, so TLC reports it VIOLATED -- proving
\* a genuine L2/L4 coverage gap (a previously-claimed slot whose owner crashed
\* and whose lease lapsed: an orphaned, dead-owner, lapsed-lease slot) really
\* occurs, and is then closed by a survivor's claim_shard. The Makefile asserts
\* this is violated.
SPECIFICATION SpecNoFair

CONSTANTS
    Replicas <- MCReplicas
    Slots <- MCSlots
    Score <- MCScore
    MemberTTL = 2
    SlotTTL = 2
    MaxEpoch = 8
    MaxChurn = 4

INVARIANT NotZeroOwnerGapReachable

CONSTRAINT StateConstraint
