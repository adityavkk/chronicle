\* TLC config: 2 subscriptions x 2 workers, exhaustive interleaving.
\* Exercises rotate-on-expired-takeover and the deposed-holder late-ack race.
\* Run: java -cp /tmp/tla2tools.jar tlc2.TLC -config SubscriptionFence_2x2.cfg MC_2x2.tla
SPECIFICATION Spec

CONSTANTS
    Workers = {w1, w2}
    Subs    = {s1, s2}
    MaxGen         = 2
    MaxClock       = 2
    MaxCrashes     = 1
    ExpireClearsFence = TRUE
    ClaimReScores  = TRUE

SYMMETRY Sym

INVARIANT Inv

PROPERTY
    GenMonotoneProp
    CursorForwardOnlyProp

CONSTRAINT StateConstraint
