\* FAULT-INJECTION config (INV-LEASE-02 negative test).
\* ClaimReScores = FALSE injects the unsound claim: instead of re-scoring the
\* due/lease member forward (claim_due.lua), it ZREMs it.  A worker that then
\* crashes after claiming but before acking leaves the subscription live with
\* no holder and NO lease member -- nothing can re-surface and reclaim it, so
\* the work is stranded (at-least-once delivery is lost).  This MUST produce a
\* NoStrandedLease counterexample, proving INV-LEASE-02 is exercised.
\* Faithful runs use ClaimReScores = TRUE.
\* Run: java -cp /tmp/tla2tools.jar tlc2.TLC -config SubscriptionFence_fault_lease.cfg MC_2x2.tla
SPECIFICATION Spec

CONSTANTS
    Workers = {w1, w2}
    Subs    = {s1}
    MaxGen            = 2
    MaxClock          = 2
    MaxCrashes        = 1
    ExpireClearsFence = TRUE
    ClaimReScores     = FALSE

SYMMETRY Sym

INVARIANT Inv

CONSTRAINT StateConstraint
