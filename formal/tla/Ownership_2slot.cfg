\* TLC config: standalone Ownership owner-epoch CAS, 2 replicas x 2 slots.
\* Exercises that per-slot ownership registers are independent.
\* Run: java -cp /tmp/tla2tools.jar tlc2.TLC -config Ownership_2slot.cfg MC_Ownership.tla
SPECIFICATION OSpec

CONSTANTS
    Replicas = {r1, r2}
    Slots    = {h1, h2}
    MaxEpoch = 2
    MaxClock = 2

SYMMETRY OSym

INVARIANT OInv

PROPERTY
    EpochMonotoneProp
    TransferBumpsEpochProp
    RenewKeepsEpochProp

CONSTRAINT OStateConstraint
