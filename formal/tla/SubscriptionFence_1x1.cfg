\* TLC config: 1 subscription x 1 worker fast lane (smoke / CI fast lane).
\* Run: java -cp /tmp/tla2tools.jar tlc2.TLC -config SubscriptionFence_1x1.cfg MC_1x1.tla
SPECIFICATION Spec

CONSTANTS
    Workers = {w1}
    Subs    = {s1}
    MaxGen         = 3
    MaxClock       = 3
    MaxCrashes     = 2
    ExpireClearsFence = TRUE
    ClaimReScores  = TRUE

SYMMETRY Sym

INVARIANT Inv

PROPERTY
    GenMonotoneProp
    CursorForwardOnlyProp

CONSTRAINT StateConstraint
