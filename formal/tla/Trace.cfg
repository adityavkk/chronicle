\* TLC config for trace validation (issue #39).
\* Run from a per-scenario dir holding a generated TraceData.tla + a copy of
\* Trace.tla + SubscriptionFence.tla, in DFS mode (research/01: BFS for small
\* checks, DFS for long traces — CCF's orders-of-magnitude speedup):
\*
\*   java -cp tla2tools.jar tlc2.TLC -deadlock -dfid 60 -config Trace.cfg Trace.tla
\*
\* VERDICT: a reported violation of INVARIANT NotAccepted is SUCCESS — the trace
\* IS a legal behavior of SubscriptionFence (S ∩ T ≠ ∅). The error trace TLC
\* prints is the accepting witness (ti past the end). "No error has been found"
\* means the trace did NOT validate: a HIGH finding (code/spec divergence).
\* INVARIANT TraceInv re-checks the spec's safety on every traced state.
SPECIFICATION TraceSpec

INVARIANT
    TraceInv
    NotAccepted

CONSTRAINT TraceConstraint
