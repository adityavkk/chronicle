# Chronicle + Redis on Kubernetes for the Jepsen-style durability test.
# Redis persists its AOF to a PVC so the log and the subscription control plane
# survive a pod restart (the durability the test asserts). Chronicle runs two
# replicas so killing one leaves a peer to run the recovery sweep.
apiVersion: v1
kind: Namespace
metadata:
  name: chronicle-jepsen
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: chronicle-jepsen
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: chronicle-jepsen
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      terminationGracePeriodSeconds: 1
      containers:
        - name: redis
          image: redis:8-alpine
          # appendfsync always honors the protocol MUSTs (the strong durability
          # config); the AOF lives on the PVC so it replays after a restart.
          args: ["redis-server", "--appendonly", "yes", "--appendfsync", "always", "--dir", "/data"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 1
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: chronicle-jepsen
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chronicle
  namespace: chronicle-jepsen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chronicle
  template:
    metadata:
      labels:
        app: chronicle
    spec:
      terminationGracePeriodSeconds: 2
      containers:
        - name: chronicle
          image: chronicle:jepsen
          imagePullPolicy: IfNotPresent
          args: ["--listen", ":4437"]
          env:
            - name: CHRONICLE_REDIS_URL
              value: "redis://redis:6379/0"
            - name: CHRONICLE_SUBSCRIPTIONS
              value: "true"
            - name: CHRONICLE_WEBHOOK_ALLOW_PRIVATE
              value: "true"
            - name: CHRONICLE_PUBLIC_URL
              value: "http://chronicle:4437"
            - name: CHRONICLE_LONG_POLL_TIMEOUT
              value: "2s"
            - name: CHRONICLE_LOG_LEVEL
              value: "info"
          ports:
            - containerPort: 4437
          readinessProbe:
            tcpSocket:
              port: 4437
            periodSeconds: 1
            failureThreshold: 2
          livenessProbe:
            tcpSocket:
              port: 4437
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: chronicle
  namespace: chronicle-jepsen
spec:
  selector:
    app: chronicle
  ports:
    - port: 4437
      targetPort: 4437
---
apiVersion: v1
kind: Service
metadata:
  name: chronicle-nodeport
  namespace: chronicle-jepsen
spec:
  type: NodePort
  selector:
    app: chronicle
  ports:
    - port: 4437
      targetPort: 4437
      nodePort: 30437
